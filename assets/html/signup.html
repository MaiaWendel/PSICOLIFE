<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/signup.css">
    <title>Cadastrar Usuário</title>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>Cadastrar</h1>
            <div id="msgError" class="message error" role="alert"></div>
            <div id="msgSuccess" class="message success" role="alert"></div>

            <form id="signupForm" novalidate>
                <div class="label-float">
                    <input type="text" id="nomeCompleto" placeholder=" " required>
                    <label for="nomeCompleto">Nome Completo</label>
                </div>
                <div class="label-float">
                    <input type="text" id="usuario" placeholder=" " required>
                    <label for="usuario">Nome de Usuário</label>
                </div>
                <div class="label-float">
                    <input type="email" id="email" placeholder=" " required>
                    <label for="email">Email</label>
                </div>
                <div class="label-float">
                    <input type="tel" id="telefone" placeholder=" " required maxlength="15">
                    <label for="telefone">Número de Telefone</label>
                </div>
                
                <div class="label-float">
                    <input type="password" id="senha" placeholder=" " required>
                    <label for="senha">Senha</label>
                    <i id="togglePassword" class="fa fa-eye toggle-password"></i>
                </div>
                <div class="label-float">
                    <input type="password" id="confirmSenha" placeholder=" " required>
                    <label for="confirmSenha">Confirmar Senha</label>
                    <i id="toggleConfirmPassword" class="fa fa-eye toggle-password"></i>
                </div>
                <div class="radio-group">
                    <label>Sexo:</label>
                    <input type="radio" id="masculino" name="sexo" value="masculino">
                    <label for="masculino">Masculino</label>
                    <input type="radio" id="feminino" name="sexo" value="feminino">
                    <label for="feminino">Feminino</label>
                </div>
                <div class="label-float">
                    <select id="psicologo" required>
                        <option value="" disabled selected>Escolha seu psicólogo</option>
                        <option value="psico1">Psicólogo 1</option>
                        <option value="psico2">Psicólogo 2</option>
                        <option value="psico3">Psicólogo 3</option>
                    </select>
                </div>
                <div class="justify-center">
                    <button type="submit">Cadastrar</button>
                </div>
            </form>
        </div>
    </div>
    <script src="../js/signup.js"></script>
</body>
</html>
