<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="../css/signup.css">
    <title>Cadastrar Usuário</title>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>Cadastrar</h1>
            <div id="msgError" class="message error" role="alert"></div>
            <div id="msgSuccess" class="message success" role="alert"></div>

            <form id="signupForm" novalidate>
                <div class="label-float">
                    <input type="text" id="nome" placeholder=" " required aria-describedby="nomeHelp">
                    <label for="nome">Nome</label>
                    <small id="nomeHelp" class="help-text"></small>
                </div>
                <div class="label-float">
                    <input type="text" id="usuario" placeholder=" " required aria-describedby="usuarioHelp">
                    <label for="usuario">Usuário</label>
                    <small id="usuarioHelp" class="help-text"></small>
                </div>
                <div class="label-float">
                    <input type="password" id="senha" placeholder=" " required aria-describedby="senhaHelp">
                    <label for="senha">Senha</label>
                    <i id="togglePassword" class="fa fa-eye toggle-password" aria-label="Mostrar/Esconder senha"></i>
                </div>
                <div class="label-float">
                    <input type="password" id="confirmSenha" placeholder=" " required aria-describedby="confirmSenhaHelp">
                    <label for="confirmSenha">Confirmar Senha</label>
                    <i id="toggleConfirmPassword" class="fa fa-eye toggle-password" aria-label="Mostrar/Esconder confirmação de senha"></i>
                </div>
                <div class="label-float">
                    <select id="psicologo" required>
                        <option value="" disabled selected></option>
                        <option value="psico1">Psicólogo 1</option>
                        <option value="psico2">Psicólogo 2</option>
                        <option value="psico3">Psicólogo 3</option>
                    </select>
                    <label for="psicologo">Escolha seu psicólogo</label>
                </div>
                <div class="justify-center">
                    <button type="submit" aria-label="Cadastrar">Cadastrar</button>
                </div>
            </form>
        </div>
    </div>
    <script src="../js/signup.js"></script>
</body>
</html>
